<!doctype html>
<html lang="et">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rehkendaja — Tööriistad</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/hack-font@3/build/web/hack.css"
    />
    <link rel="stylesheet" href="noir.css" />
    <link rel="stylesheet" href="css/rehkendaja.css" />
    <!-- page-specific styles moved to css/rehkendaja.css -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data:;"
    />
  </head>
  <body>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="app-shell">
      <!-- ── SIDEBAR ── -->
      <nav class="sidebar" id="sidebar">
        <a class="sidebar-brand" href="index.html">
          <div class="brand-mark"></div>
          <div class="brand-name">Tööriistad</div>
        </a>

        <div class="nav-section-label"></div>

        <a class="nav-item" href="index.html">
          <span class="nav-sigil">01</span>
          Narkonimekirjad I–VI
        </a>

        <a class="nav-item active" href="rehkendaja.html">
          <span class="nav-sigil">02</span>
          Rehkendaja
        </a>

        <a class="nav-item" href="isikukood.html">
          <span class="nav-sigil">03</span>
          Isikukood ja vanus
        </a>

        <div class="sidebar-foot">
          © Andraš Tšitškan <span class="footer-year"></span>
        </div>
      </nav>

      <!-- ── PAGE CONTENT ── -->
      <div class="page-content">
        <div class="topbar">
          <div class="header-chrome"></div>
          <div class="header-main">
            <button
              class="sidebar-toggle"
              id="sidebar-toggle"
              aria-label="Ava menüü"
            >
              ☰
            </button>
            <div class="title-block">
              <h1>Rehkendaja</h1>
              <div class="subtitle">
                <span class="subtitle-label"
                  >Tuvastab ja liidab tekstis leiduvad arvud (ei arvesta
                  miinusmärke)</span
                >
              </div>
            </div>
          </div>
        </div>

        <main>
          <div class="tool-wrap">
            <!-- Input -->
            <div class="panel">
              <div
                class="panel-header"
                style="
                  display: flex;
                  align-items: center;
                  justify-content: space-between;
                  gap: 12px;
                "
              >
                <span>// Sisesta tekst</span>
                <div class="unit-switcher">
                  <button class="unit-btn active" id="btn-eur">€ euro</button>
                  <button class="unit-btn" id="btn-g">g gramm</button>
                  <button class="unit-btn" id="btn-n">∑ kõik arvud</button>
                </div>
              </div>
              <div class="input-wrap">
                <div
                  class="input-highlight"
                  id="input-highlight"
                  aria-hidden="true"
                ></div>
                <textarea
                  id="input-text"
                  placeholder="Sisesta siia tekst, mis sisaldab arve."
                  spellcheck="false"
                  tabindex="1"
                ></textarea>
              </div>
            </div>

            <!-- Results -->
            <div class="results-panel" id="results-panel">
              <!-- Sum -->
              <div class="result-block" id="block-sum">
                <div class="result-header">
                  <span class="result-label">// Hulga summa</span>
                  <button class="copy-btn" id="copy-sum">Kopeeri summa</button>
                </div>
                <div class="sum-value" id="val-sum">0</div>
              </div>

              <!-- Count -->
              <div class="result-block" id="block-count">
                <div class="result-header">
                  <span class="result-label">// Hulga elementide arv</span>
                </div>
                <div class="count-value" id="val-count">0</div>
              </div>

              <!-- List -->
              <div class="result-block" id="block-list">
                <div class="result-header">
                  <span class="result-label">// Hulga elemendid</span>
                  <button class="copy-btn" id="copy-list">
                    Kopeeri nimekiri
                  </button>
                </div>
                <ol class="elements-list" id="val-list">
                  <li style="color: var(--dim)">–</li>
                </ol>
              </div>
            </div>
          </div>
        </main>

        <footer></footer>
      </div>
    </div>

    <script type="module" src="js/rehkendaja.js"></script>
  </body>
</html>
