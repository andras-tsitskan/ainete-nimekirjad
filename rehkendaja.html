<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rehkendaja — Tööriistad</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/hack-font@3/build/web/hack.css">

<style>
/* ── Page-specific styles ── */
.tool-wrap {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
  align-items: stretch;
}


@media (max-width: 900px) {
  .tool-wrap { grid-template-columns: 1fr; }
}

/* Input panel */
.panel {
  border: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  height: 100%;
}

.panel-header {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--dim);
  background: var(--deep);
}

/* Highlight overlay container */
.input-wrap {
  position: relative;
  flex: 1;
  min-height: 0;
}

/* The mirror div — must match textarea pixel-perfectly */
.input-highlight {
  position: absolute;
  inset: 0;
  box-sizing: border-box;
  padding: 16px;
  /* Reserve scrollbar width so text reflows identically to textarea */
  padding-right: calc(16px + 15px);
  font-family: var(--mono);
  font-size: 14px;
  line-height: 1.7;
  color: transparent;
  white-space: pre-wrap;
  word-wrap: break-word;
  word-break: break-word;
  overflow: hidden;
  pointer-events: none;
  z-index: 1;
}

.input-highlight mark {
  background: rgba(245, 185, 66, 0.28);
  color: transparent;
  border-radius: 2px;
  outline: 1px solid rgba(245, 185, 66, 0.5);
  padding: 0;
}

#input-text {
  position: absolute;
  inset: 0;
  box-sizing: border-box;
  width: 100%;
  height: 100%;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: var(--mono);
  font-size: 14px;
  line-height: 1.7;
  padding: 16px;
  resize: none;
  outline: none;
  caret-color: var(--amber);
  z-index: 2;
  overflow-y: scroll;
}
#input-text::placeholder { color: var(--dim); }

/* Results panel */
.results-panel {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.result-block {
  border: 1px solid var(--border);
  background: var(--surface);
  overflow: hidden;
  animation: appear 0.2s ease both;
}

@keyframes appear {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

.result-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--deep);
  border-bottom: 1px solid var(--border);
  gap: 12px;
}

.result-label {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--dim);
}

.copy-btn {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  background: none;
  border: 1px solid var(--border);
  padding: 3px 10px;
  cursor: pointer;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
  letter-spacing: 0.06em;
}
.copy-btn:hover {
  background: var(--lift);
  color: var(--text);
  border-color: var(--line);
}
.copy-btn.copied {
  color: var(--amber);
  border-color: var(--amber);
}

.result-value {
  padding: 14px 16px;
  font-size: 15px;
  color: var(--text);
  line-height: 1.6;
}

/* Sum value — larger */
.sum-value {
  font-size: 28px;
  font-weight: 700;
  color: var(--amber);
  letter-spacing: -0.02em;
  padding: 18px 16px;
}

/* Count */
.count-value {
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  padding: 16px 16px;
}

/* Ordered list of elements */
.elements-list {
  padding: 12px 16px;
  margin: 0;
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.elements-list li {
  display: flex;
  align-items: baseline;
  gap: 10px;
  font-size: 14px;
  color: var(--text);
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
}
.elements-list li:last-child { border-bottom: none; }

.el-num {
  font-size: 10px;
  color: var(--dim);
  width: 28px;
  text-align: right;
  flex-shrink: 0;
}

/* Empty state */
.empty-state {
  padding: 40px 16px;
  text-align: center;
  color: var(--dim);
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

/* Unit switcher */
.unit-switcher {
  display: flex;
  border: 1px solid var(--border);
  overflow: hidden;
  flex-shrink: 0;
}
.unit-btn {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  padding: 5px 14px;
  background: none;
  border: none;
  color: var(--dim);
  cursor: pointer;
  transition: background 0.12s, color 0.12s;
  border-right: 1px solid var(--border);
}
.unit-btn:last-child { border-right: none; }
.unit-btn:hover  { background: var(--lift); color: var(--text); }
.unit-btn.active { background: var(--surface); color: var(--amber); }
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app-shell">

  <!-- ── SIDEBAR ── -->
  <nav class="sidebar" id="sidebar">
    <a class="sidebar-brand" href="index.html">
      <div class="brand-mark"></div>
      <div class="brand-name">Tööriistad</div>
    </a>

    <div class="nav-section-label"></div>

    <a class="nav-item" href="index.html">
      <span class="nav-sigil">01</span>
      Narkonimekirjad I–VI
    </a>

    <a class="nav-item active" href="rehkendaja.html">
      <span class="nav-sigil">02</span>
      Rehkendaja
    </a>

    <a class="nav-item" href="isikukood.html">
      <span class="nav-sigil">03</span>
      Isikukood ja vanus
    </a>

    <div class="sidebar-foot">
      © Andraš Tšitškan <span class="footer-year"></span>
    </div>
  </nav>

  <!-- ── PAGE CONTENT ── -->
  <div class="page-content">

    <div class="topbar">
      <div class="header-chrome"></div>
      <div class="header-main">
        <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Ava menüü">☰</button>
        <div class="title-block">
          <h1>Rehkendaja</h1>
          <div class="subtitle">
            <span class="subtitle-label">Tuvastab ja liidab tekstis leiduvad arvud (ei arvesta miinusmärke)</span>
          </div>
        </div>

      </div>
    </div>

    <main>
      <div class="tool-wrap">

        <!-- Input -->
        <div class="panel">
          <div class="panel-header" style="display:flex;align-items:center;justify-content:space-between;gap:12px">
            <span>// Sisesta tekst</span>
            <div class="unit-switcher">
              <button class="unit-btn active" id="btn-eur">€ euro</button>
              <button class="unit-btn"        id="btn-g">g gramm</button>
              <button class="unit-btn"        id="btn-n">∑ kõik arvud</button>
            </div>
          </div>
          <div class="input-wrap">
            <div class="input-highlight" id="input-highlight" aria-hidden="true"></div>
            <textarea id="input-text" placeholder="Sisesta siia tekst, mis sisaldab arve." spellcheck="false" tabindex="1"></textarea>
          </div>
        </div>

        <!-- Results -->
        <div class="results-panel" id="results-panel">

          <!-- Sum -->
          <div class="result-block" id="block-sum">
            <div class="result-header">
              <span class="result-label">// Hulga summa</span>
              <button class="copy-btn" id="copy-sum">Kopeeri summa</button>
            </div>
            <div class="sum-value" id="val-sum">0</div>
          </div>

          <!-- Count -->
          <div class="result-block" id="block-count">
            <div class="result-header">
              <span class="result-label">// Hulga elementide arv</span>
            </div>
            <div class="count-value" id="val-count">0</div>
          </div>

          <!-- List -->
          <div class="result-block" id="block-list">
            <div class="result-header">
              <span class="result-label">// Hulga elemendid</span>
              <button class="copy-btn" id="copy-list">Kopeeri nimekiri</button>
            </div>
            <ol class="elements-list" id="val-list">
              <li style="color:var(--dim)">–</li>
            </ol>
          </div>

        </div>
      </div>
    </main>

    <footer></footer>

  </div>
</div>

<script>
// ── Sidebar toggle ──────────────────────────────────────────────────────────
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('sidebar-overlay');
const togBtn  = document.getElementById('sidebar-toggle');

function openSidebar()  { sidebar.classList.add('open');    overlay.classList.add('visible'); }
function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('visible'); }
togBtn.addEventListener('click', () =>
  sidebar.classList.contains('open') ? closeSidebar() : openSidebar()
);
overlay.addEventListener('click', closeSidebar);

// ── Unit mode ───────────────────────────────────────────────────────────────
// 'eur' or 'g'
let mode = 'eur';

const btnEur       = document.getElementById('btn-eur');
const btnG         = document.getElementById('btn-g');
const btnN         = document.getElementById('btn-n');
const inputEl      = document.getElementById('input-text');
const highlightEl  = document.getElementById('input-highlight');

btnEur.addEventListener('click', () => setMode('eur'));
btnG.addEventListener('click',   () => setMode('g'));
btnN.addEventListener('click',   () => setMode('n'));

function setMode(m) {
  mode = m;
  btnEur.classList.toggle('active', m === 'eur');
  btnG.classList.toggle('active',   m === 'g');
  btnN.classList.toggle('active',   m === 'n');
  inputEl.placeholder = 'Sisesta siia tekst, mis sisaldab arve.';
  update();
}

// ── Regex patterns ──────────────────────────────────────────────────────────
//
// Euro (number-first or currency-first):
//   1 234,56 €  /  € 1 234,56  /  1234.56 EUR  /  1 234,56 eurot
//
// Gram (number-first only — grams are never written "g 1.5"):
//   1,5 g  /  1.5 g  /  12 grammi  /  1 gramm  /  0,5g

const EURO_RE = /((?:€|EUR|eurot|euro)\s*([\d][\d\s.,]*))|(([\d][\d\s.,]*)\s*(?:€|EUR|eurot|euro))/gim;
const NUM_RE  = /(?<![\d,.])(\d[\d\s]*(?:[.,]\d+)*)(?!\d)/gim;
const GRAM_RE = /(([\d][\d\s.,]*)\s*(?:grammi|gramm|g)(?=[\s.,;:)\]}\n\r]|$))/gim;

function activeRe() {
  let re;
  if      (mode === 'eur') re = EURO_RE;
  else if (mode === 'g')   re = GRAM_RE;
  else                     re = NUM_RE;
  re.lastIndex = 0;
  return re;
}

// ── Parsing ─────────────────────────────────────────────────────────────────
function parseAmount(raw) {
  let s = raw.replace(/\s/g, '');
  const hasDot   = s.includes('.');
  const hasComma = s.includes(',');
  if (hasDot && hasComma) {
    if (s.lastIndexOf(',') > s.lastIndexOf('.')) {
      s = s.replace(/\./g, '').replace(',', '.');
    } else {
      s = s.replace(/,/g, '');
    }
  } else if (hasComma) {
    s = s.replace(',', '.');
  }
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

function extractAmounts(text) {
  const re      = activeRe();
  const results = [];
  let match;
  while ((match = re.exec(text)) !== null) {
    // Euro: group 2 (currency-first numeric) or group 4 (number-first numeric)
    // Gram: group 2 · Numbers: group 1
    const rawNum = (match[2] || match[4] || match[1] || '').trim();
    if (!rawNum) continue;
    const amount = parseAmount(rawNum);
    if (amount !== null && amount >= 0) {
      results.push({ raw: rawNum, amount, decimals: countDecimals(rawNum), index: match.index, matchLen: match[0].length });
    }
  }
  return results;
}

// ── Formatting ──────────────────────────────────────────────────────────────
// Count decimal places in a raw numeric string (after normalising separator)
function countDecimals(raw) {
  const s = raw.replace(/\s/g, '');
  // Find the decimal separator: if both present, rightmost wins
  const di = Math.max(s.lastIndexOf(','), s.lastIndexOf('.'));
  if (di === -1) return 0;
  return s.length - di - 1;
}

function formatValue(n, decimals) {
  if (mode === 'eur') {
    return n.toLocaleString('et-EE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
  } else if (mode === 'g') {
    const d = (decimals !== undefined) ? Math.min(decimals, 10) : 10;
    return n.toLocaleString('et-EE', { minimumFractionDigits: 0, maximumFractionDigits: d }) + ' g';
  } else {
    const d = (decimals !== undefined) ? Math.min(decimals, 10) : 10;
    return n.toLocaleString('et-EE', { minimumFractionDigits: 0, maximumFractionDigits: d });
  }
}

function unitShort() {
  if (mode === 'eur') return '€';
  if (mode === 'g')   return 'g';
  return '';
}

function formatNumeric(n, decimals) {
  if (mode === 'eur') {
    return n.toLocaleString('et-EE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  const d = (decimals !== undefined) ? Math.min(decimals, 10) : 10;
  return n.toLocaleString('et-EE', { minimumFractionDigits: 0, maximumFractionDigits: d });
}

// ── Highlight mirror ────────────────────────────────────────────────────────
inputEl.addEventListener('scroll', () => {
  highlightEl.scrollTop  = inputEl.scrollTop;
  highlightEl.scrollLeft = inputEl.scrollLeft;
});

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildHighlightHtml(text, matches) {
  if (!matches.length) return escHtml(text);
  let html = '', cursor = 0;
  for (const m of matches) {
    if (m.index > cursor) html += escHtml(text.slice(cursor, m.index));
    html += '<mark>' + escHtml(text.slice(m.index, m.index + m.matchLen)) + '</mark>';
    cursor = m.index + m.matchLen;
  }
  if (cursor < text.length) html += escHtml(text.slice(cursor));
  return html;
}

// ── Render ──────────────────────────────────────────────────────────────────

const blockSum   = document.getElementById('block-sum');
const blockCount = document.getElementById('block-count');
const blockList  = document.getElementById('block-list');
const valSum     = document.getElementById('val-sum');
const valCount   = document.getElementById('val-count');
const valList    = document.getElementById('val-list');

let lastFound = [];

function update() {
  const text = inputEl.value;
  lastFound  = extractAmounts(text);

  highlightEl.innerHTML = buildHighlightHtml(text + ' ', lastFound);
  highlightEl.scrollTop = inputEl.scrollTop;

  const hasText = !!text.trim();
  if (!hasText) {
    valSum.textContent   = '0';
    valCount.textContent = '0';
    valList.innerHTML    = '<li style="color:var(--dim)">–</li>';
    return;
  }

  const maxDec = lastFound.reduce((m, x) => Math.max(m, x.decimals), 0);
  const total  = lastFound.reduce((acc, x) => acc + x.amount, 0);
  valSum.textContent   = lastFound.length ? formatValue(total, maxDec) : '0 ' + unitShort();
  valCount.textContent = lastFound.length;

  valList.innerHTML = '';
  if (lastFound.length === 0) {
    const li = document.createElement('li');
    li.style.cssText = 'color:var(--dim);font-size:12px;letter-spacing:0.1em';
    li.textContent   = '// ühtegi elementi ei leitud';
    valList.appendChild(li);
  } else {
    lastFound.forEach((item, i) => {
      const li = document.createElement('li');
      li.innerHTML = '<span class="el-num">' + String(i + 1).padStart(2, '0') + '</span>' + formatValue(item.amount, item.decimals);
      valList.appendChild(li);
    });
  }
}

inputEl.addEventListener('input', update);

// ── Copy buttons ────────────────────────────────────────────────────────────
function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    const orig = btn.textContent;
    btn.textContent = 'Kopeeritud \u2713';
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1800);
  });
}

document.getElementById('copy-sum').addEventListener('click', () => {
  copyText(document.getElementById('copy-sum'), valSum.textContent);
});

document.getElementById('copy-list').addEventListener('click', () => {
  const text = lastFound.map(x => formatNumeric(x.amount, x.decimals)).join('\n');
  copyText(document.getElementById('copy-list'), text);
});

// ── Bootstrap ───────────────────────────────────────────────────────────────
document.querySelectorAll('.footer-year').forEach(el => el.textContent = new Date().getFullYear());

// ── Test data ────────────────────────────────────────────────────────────────
// Access via: rehkendajaTest.run() or rehkendajaTest.text in browser console
window.rehkendajaTest = {
  text: [
    'Kohtuasi nr 1-23/456. Konfiskeeriti 0,5g heroiini ja 1.2g kokaiini.',
    'Täiendavalt leiti 12 grammi amfetamiini ning 0,0002g fentanüüli.',
    'Varalise kahju suurus on 1 234,56 € ning lisaks 89.50 € kulud.',
    'Trahv määrati summas EUR 500 ja täiendav makse 75,00 eurot.',
    'Analüüsi tulemus: 1 000,001g ainet kogumassiga, sh 3.14g lisainet.',
    'Väärtus oli €350 ja veel 1.234,56 EUR (kokku kaks summat).',
    'Leitud kogused: 7g, 0.003g ja 2 500g pulbrit.',
    'Protokollis märgitud arvud: 42, 1 000, 3,14 ja 0,0002.',
  ].join('\n'),

  expected: {
    eur: {
      items:  ['1 234,56', '89.50', '500', '75,00', '350', '1.234,56'],
      values: [1234.56,     89.50,  500,   75.00,   350,   1234.56],
      sum:    3483.62,
      count:  6,
      note:   'Sum: 1234.56 + 89.50 + 500 + 75.00 + 350 + 1234.56 = 3 483,62 €',
    },
    g: {
      items:  ['0,5', '1.2', '12', '0,0002', '1 000,001', '3.14', '7', '0.003', '2 500'],
      values: [0.5,   1.2,   12,   0.0002,   1000.001,    3.14,   7,   0.003,   2500  ],
      sum:    3523.8442,
      count:  9,
      note:   'Sum: 0.5+1.2+12+0.0002+1000.001+3.14+7+0.003+2500 = 3 523,8442 g',
    },
    n: {
      note: 'Catches all standalone numbers — sum is not semantically meaningful.',
    },
  },

  // Pastes test text into the input and runs detection in the current mode.
  run() {
    const ta = document.getElementById('input-text');
    ta.value = this.text;
    ta.dispatchEvent(new Event('input'));
    const exp = this.expected[mode];
    if (exp && exp.sum !== undefined) {
      console.group('rehkendajaTest — mode: ' + mode);
      console.log('Expected sum:  ', exp.sum);
      console.log('Expected count:', exp.count);
      console.log('Expected items:', exp.items);
      console.log('Note:', exp.note);
      console.log('Detected:', lastFound.map(x => x.raw + ' → ' + x.amount));
      const detectedSum = Math.round(lastFound.reduce((a,x) => a + x.amount, 0) * 1e10) / 1e10;
      console.log('Detected sum:  ', detectedSum);
      console.log(detectedSum === exp.sum ? '✓ PASS' : '✗ FAIL — expected ' + exp.sum + ', got ' + detectedSum);
      console.groupEnd();
    } else {
      console.log('rehkendajaTest.run() — mode "' + mode + '": no expected sum defined.');
      console.log('Detected:', lastFound.map(x => x.raw + ' → ' + x.amount));
    }
  },
};
</script>
</body>
</html>
