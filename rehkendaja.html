<!doctype html>
<html lang="et">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rehkendaja — Tööriistad</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/hack-font@3/build/web/hack.css"
    />
    <link rel="stylesheet" href="noir.css" />
    <style>
      /* ── Page-specific styles ── */
      .tool-wrap {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 28px;
        align-items: start;
      }

      @media (max-width: 900px) {
        .tool-wrap {
          grid-template-columns: 1fr;
        }
      }

      /* Input panel */
      .panel {
        border: 1px solid var(--border);
        background: var(--surface);
        display: flex;
        flex-direction: column;
      }

      .panel-header {
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        font-size: 10px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--dim);
        background: var(--deep);
      }

      /* Highlight overlay container — mirror div sizes it, textarea overlays */
      .input-wrap {
        position: relative;
        pointer-events: auto;
      }

      /* The mirror div — drives height; textarea overlaid on top */
      .input-highlight {
        display: block;
        box-sizing: border-box;
        width: 100%;
        min-height: 120px;
        padding: 16px;
        font-family: var(--mono);
        font-size: 14px;
        line-height: 1.7;
        color: transparent;
        white-space: pre-wrap;
        word-wrap: break-word;
        word-break: break-word;
        cursor: text;
      }

      .input-highlight mark {
        background: rgba(245, 185, 66, 0.28);
        color: transparent;
        border-radius: 2px;
        outline: 1px solid rgba(245, 185, 66, 0.5);
        padding: 0;
        pointer-events: auto;
        cursor: pointer;
      }
      .input-highlight mark.excluded {
        background: rgba(122, 132, 168, 0.12);
        outline: 1px solid rgba(122, 132, 168, 0.25);
        text-decoration: line-through;
      }
      .reset-btn {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--dim);
        background: none;
        border: none;
        padding: 0;
        cursor: pointer;
        letter-spacing: 0.06em;
        transition: color 0.12s;
        display: none;
      }
      .reset-btn:hover {
        color: var(--amber);
      }
      .reset-btn.visible {
        display: inline;
      }
      .el-excluded {
        opacity: 0.35;
        text-decoration: line-through;
      }

      #input-text {
        position: absolute;
        inset: 0;
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        background: transparent;
        border: none;
        color: var(--text);
        font-family: var(--mono);
        font-size: 14px;
        line-height: 1.7;
        padding: 16px;
        resize: none;
        outline: none;
        caret-color: var(--amber);
        overflow: hidden;
        pointer-events: none;
      }
      #input-text::placeholder {
        color: var(--dim);
      }

      /* Results panel */
      .results-panel {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .result-block {
        border: 1px solid var(--border);
        background: var(--surface);
        overflow: hidden;
        animation: appear 0.2s ease both;
      }

      @keyframes appear {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .result-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 16px;
        background: var(--deep);
        border-bottom: 1px solid var(--border);
        gap: 12px;
      }

      .result-label {
        font-size: 10px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--dim);
      }

      .copy-btn {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        background: none;
        border: 1px solid var(--border);
        padding: 3px 10px;
        cursor: pointer;
        transition:
          background 0.12s,
          color 0.12s,
          border-color 0.12s;
        letter-spacing: 0.06em;
      }
      .copy-btn:hover {
        background: var(--lift);
        color: var(--text);
        border-color: var(--line);
      }
      .copy-btn.copied {
        color: var(--amber);
        border-color: var(--amber);
      }

      .result-value {
        padding: 14px 16px;
        font-size: 15px;
        color: var(--text);
        line-height: 1.6;
      }

      /* Sum value — larger */
      .sum-value {
        font-size: 28px;
        font-weight: 700;
        color: var(--amber);
        letter-spacing: -0.02em;
        padding: 18px 16px;
      }

      /* Count */
      .count-value {
        font-size: 24px;
        font-weight: 700;
        color: var(--text);
        padding: 16px 16px;
      }

      /* Ordered list of elements */
      .elements-list {
        padding: 12px 16px;
        margin: 0;
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .elements-list li {
        display: flex;
        align-items: baseline;
        gap: 10px;
        font-size: 14px;
        color: var(--text);
        padding: 5px 0;
        border-bottom: 1px solid var(--border);
      }
      .elements-list li:last-child {
        border-bottom: none;
      }

      .el-num {
        font-size: 10px;
        color: var(--dim);
        width: 28px;
        text-align: right;
        flex-shrink: 0;
      }

      /* Empty state */
      .empty-state {
        padding: 40px 16px;
        text-align: center;
        color: var(--dim);
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      /* Unit switcher */
      .unit-switcher {
        display: flex;
        border: 1px solid var(--border);
        overflow: hidden;
        flex-shrink: 0;
      }
      .unit-btn {
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 0.1em;
        padding: 5px 14px;
        background: none;
        border: none;
        color: var(--dim);
        cursor: pointer;
        transition:
          background 0.12s,
          color 0.12s;
        border-right: 1px solid var(--border);
      }
      .unit-btn:last-child {
        border-right: none;
      }
      .unit-btn:hover {
        background: var(--lift);
        color: var(--text);
      }
      .unit-btn.active {
        background: var(--surface);
        color: var(--amber);
      }
    </style>
  </head>
  <body>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="app-shell">
      <!-- ── SIDEBAR ── -->
      <nav class="sidebar" id="sidebar"></nav>

      <!-- ── PAGE CONTENT ── -->
      <div class="page-content">
        <div class="topbar">
          <div class="header-chrome"></div>
          <div class="header-main">
            <button
              class="sidebar-toggle"
              id="sidebar-toggle"
              aria-label="Ava menüü"
            >
              ☰
            </button>
            <div class="title-block">
              <h1>Rehkendaja</h1>
              <div class="subtitle">
                <span class="subtitle-label"
                  >Tuvastab ja liidab tekstis leiduvad arvud (ei arvesta
                  miinusmärke)</span
                >
              </div>
            </div>
          </div>
        </div>

        <main>
          <div class="tool-wrap">
            <!-- Input -->
            <div class="panel">
              <div
                class="panel-header"
                style="
                  display: flex;
                  align-items: center;
                  justify-content: space-between;
                  gap: 12px;
                "
              >
                <span>// Sisesta tekst</span>
                <div class="unit-switcher">
                  <button class="unit-btn active" id="btn-eur">€ euro</button>
                  <button class="unit-btn" id="btn-g">g gramm</button>
                  <button class="unit-btn" id="btn-n">∑ kõik arvud</button>
                </div>
              </div>
              <div class="input-wrap">
                <div
                  class="input-highlight"
                  id="input-highlight"
                  aria-hidden="true"
                ></div>
                <textarea
                  id="input-text"
                  placeholder="Sisesta siia tekst, mis sisaldab arve."
                  spellcheck="false"
                  tabindex="1"
                ></textarea>
              </div>
            </div>

            <!-- Results -->
            <div class="results-panel" id="results-panel">
              <!-- Sum -->
              <div class="result-block" id="block-sum">
                <div class="result-header">
                  <span class="result-label">// Hulga summa</span>
                  <div style="display: flex; align-items: center; gap: 12px">
                    <button class="reset-btn" id="reset-btn">lähtesta</button>
                    <button class="copy-btn" id="copy-sum">
                      Kopeeri summa
                    </button>
                  </div>
                </div>
                <div class="sum-value" id="val-sum">0</div>
              </div>

              <!-- Count -->
              <div class="result-block" id="block-count">
                <div class="result-header">
                  <span class="result-label">// Hulga elementide arv</span>
                </div>
                <div class="count-value" id="val-count">0</div>
              </div>

              <!-- List -->
              <div class="result-block" id="block-list">
                <div class="result-header">
                  <span class="result-label">// Hulga elemendid</span>
                  <button class="copy-btn" id="copy-list">
                    Kopeeri nimekiri
                  </button>
                </div>
                <ol class="elements-list" id="val-list">
                  <li style="color: var(--dim)">–</li>
                </ol>
              </div>
            </div>
          </div>
        </main>

        <footer></footer>
      </div>
    </div>

    <script src="rehkendaja-core.js"></script>
    <script src="nav.js"></script>
    <script>
      // ── Unit mode ───────────────────────────────────────────────────────────────
      const btnEur = document.getElementById("btn-eur");
      const btnG = document.getElementById("btn-g");
      const btnN = document.getElementById("btn-n");
      const inputEl = document.getElementById("input-text");
      const highlightEl = document.getElementById("input-highlight");
      const inputWrap = document.querySelector(".input-wrap");

      btnEur.addEventListener("click", () => setMode("eur"));
      btnG.addEventListener("click", () => setMode("g"));
      btnN.addEventListener("click", () => setMode("n"));

      function setMode(m) {
        mode = m;
        btnEur.classList.toggle("active", m === "eur");
        btnG.classList.toggle("active", m === "g");
        btnN.classList.toggle("active", m === "n");
        update();
      }

      // ── Highlight mirror ────────────────────────────────────────────────────────
      inputEl.addEventListener("scroll", () => {
        highlightEl.scrollTop = inputEl.scrollTop;
        highlightEl.scrollLeft = inputEl.scrollLeft;
      });

      // Allow clicks to reach highlight layer
      inputEl.style.pointerEvents = "none";
      inputWrap.addEventListener("click", () => inputEl.focus());

      function escHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      // Improvement #1 — clean highlight builder
      function buildHighlightHtml(text, matches) {
        if (!matches.length) return escHtml(text);

        let html = "";
        let cursor = 0;

        matches.forEach((m, i) => {
          if (m.index > cursor) {
            html += escHtml(text.slice(cursor, m.index));
          }
          const cls = excluded.has(i) ? ' class="excluded"' : "";
          html += `<mark${cls} data-idx="${i}">${escHtml(
            text.slice(m.index, m.index + m.matchLen),
          )}</mark>`;
          cursor = m.index + m.matchLen;
        });

        if (cursor < text.length) {
          html += escHtml(text.slice(cursor));
        }

        return html + (text.endsWith("\n") ? " " : "") + "<span></span>"; // prevents trailing-mark collapse
      }

      // Improvement #3 — toggle via highlight click
      highlightEl.addEventListener("click", (e) => {
        const mark = e.target.closest("mark");
        if (!mark) return;
        const idx = Number(mark.dataset.idx);
        if (!Number.isNaN(idx)) toggleExclude(idx);
      });

      function toggleExclude(idx) {
        if (excluded.has(idx)) excluded.delete(idx);
        else excluded.add(idx);
        renderResults();
      }

      // ── Render ──────────────────────────────────────────────────────────────────
      const valSum = document.getElementById("val-sum");
      const valCount = document.getElementById("val-count");
      const valList = document.getElementById("val-list");

      let lastFound = [];
      let excluded = new Set();

      function update() {
        const text = inputEl.value;
        lastFound = extractAmounts(text);
        excluded.clear();
        renderResults();
      }

      function renderResults() {
        const text = inputEl.value;
        const active = lastFound.filter((_, i) => !excluded.has(i));
        const hasText = !!text.trim();

        highlightEl.innerHTML = buildHighlightHtml(text, lastFound);
        highlightEl.scrollTop = inputEl.scrollTop;

        const resetBtn = document.getElementById("reset-btn");
        resetBtn.classList.toggle("visible", excluded.size > 0);

        if (!hasText) {
          valSum.textContent = "0";
          valCount.textContent = "0";
          valList.innerHTML = '<li style="color:var(--dim)">–</li>';
          return;
        }

        const maxDec = active.reduce((m, x) => Math.max(m, x.decimals), 0);
        const total = active.reduce((acc, x) => acc + x.amount, 0);

        valSum.textContent = active.length
          ? formatValue(total, maxDec)
          : "0 " + unitShort();

        valCount.textContent =
          active.length + (excluded.size > 0 ? " / " + lastFound.length : "");

        valList.innerHTML = "";
        if (lastFound.length === 0) {
          const li = document.createElement("li");
          li.style.cssText =
            "color:var(--dim);font-size:12px;letter-spacing:0.1em";
          li.textContent = "// ühtegi elementi ei leitud";
          valList.appendChild(li);
        } else {
          lastFound.forEach((item, i) => {
            const li = document.createElement("li");
            const isExcluded = excluded.has(i);
            li.className = isExcluded ? "el-excluded" : "";
            li.style.cursor = "pointer";
            li.title = isExcluded
              ? "Kliki, et lisada tagasi"
              : "Kliki, et eemaldada";
            li.innerHTML =
              `<span class="el-num">${String(i + 1).padStart(2, "0")}</span>` +
              formatValue(item.amount, item.decimals);
            li.addEventListener("click", () => toggleExclude(i));
            valList.appendChild(li);
          });
        }
      }

      // Improvement #2 — debounced input
      let updateTimer = null;
      inputEl.addEventListener("input", () => {
        clearTimeout(updateTimer);
        updateTimer = setTimeout(update, 80);
      });

      // ── Copy buttons ────────────────────────────────────────────────────────────
      function copyText(btn, text) {
        // Improvement #5 — prevent spam
        if (btn.classList.contains("copied")) return;

        navigator.clipboard.writeText(text).then(() => {
          btn.classList.add("copied");
          const orig = btn.textContent;
          btn.textContent = "Kopeeritud ✓";
          setTimeout(() => {
            btn.textContent = orig;
            btn.classList.remove("copied");
          }, 1800);
        });
      }

      document.getElementById("copy-sum").addEventListener("click", () => {
        copyText(document.getElementById("copy-sum"), valSum.textContent);
      });

      document.getElementById("copy-list").addEventListener("click", () => {
        const text = lastFound
          .filter((_, i) => !excluded.has(i))
          .map((x) => formatNumeric(x.amount, x.decimals))
          .join("\n");
        copyText(document.getElementById("copy-list"), text);
      });

      // ── Reset exclusions ────────────────────────────────────────────────────────
      document.getElementById("reset-btn").addEventListener("click", () => {
        excluded.clear();
        renderResults();
      });

      // ── Bootstrap ───────────────────────────────────────────────────────────────
      document
        .querySelectorAll(".footer-year")
        .forEach((el) => (el.textContent = new Date().getFullYear()));
    </script>
  </body>
</html>
