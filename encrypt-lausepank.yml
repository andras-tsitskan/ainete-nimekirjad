name: Encrypt lausepank-andmed.json

on:
  push:
    paths:
      - "lausepank-andmed.json" # only runs when this file is pushed

jobs:
  encrypt:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to commit back to the repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cryptography
        run: pip install cryptography

      - name: Encrypt and replace
        env:
          MALLID_PASSWORD: ${{ secrets.MALLID_PASSWORD }}
        run: python3 .github/workflows/encrypt_lausepank.py

      - name: Commit encrypted file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lausepank-andmed.enc
          git rm --cached lausepank-andmed.json
          git commit -m "chore: encrypt lausepank-andmed.json [skip ci]"
          git push
