name: Update drug list data

on:
  schedule:
    - cron: '0 6 * * 1'  # Igal esmaspäeval kell 06:00 UTC
  workflow_dispatch:       # Lubab ka käsitsi käivitamise GitHub UI-st

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pdfplumber

      - name: Run scraper
        # Skript väljub koodiga 1, kui nimekirjad on tühjad.
        # GitHub Actions märgib jooku siis ebaõnnestunuks ja saadab
        # e-posti teavituse repoomanikule automaatselt.
        run: python scrape.py

      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Commitib ainult siis, kui fail muutus
          git diff --staged --quiet || git commit -m "chore: update data.json [skip ci]"
          git push
