name: Update drug list data

on:
  schedule:
    - cron: "0 6 * * *" # Iga paev kell 06.00 UTC
  workflow_dispatch: # Lubab ka kasitsi kaivitamise GitHub UI-st

permissions:
  contents: write # Lubab actions[bot]-il faile commitida ja pushida

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pdfplumber

      - name: Run scraper
        run: python scrape.py

      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update data.json [skip ci]"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
