<!doctype html>
<html lang="et">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lausepank — Tööriistad</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/hack-font@3/build/web/hack.css"
    />
    <link rel="stylesheet" href="noir.css" />
    <style>
      /* ── Filter bar ── */
      .filter-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 28px;
        align-items: flex-start;
      }

      .filter-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .filter-group-label {
        font-size: 10px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--dim);
      }

      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .tag-btn {
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 0.08em;
        padding: 4px 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--muted);
        cursor: pointer;
        transition:
          background 0.1s,
          color 0.1s,
          border-color 0.1s;
        white-space: nowrap;
      }
      .tag-btn:hover {
        background: var(--lift);
        color: var(--text);
        border-color: var(--line);
      }
      .tag-btn.active {
        background: var(--lift);
        color: var(--amber);
        border-color: var(--amber);
      }

      .filter-sep {
        width: 1px;
        background: var(--border);
        align-self: stretch;
        margin: 0 4px;
        flex-shrink: 0;
      }

      /* ── Results count ── */
      .results-meta {
        font-size: 12px;
        color: var(--dim);
        letter-spacing: 0.06em;
        margin-bottom: 20px;
      }
      .results-meta span {
        color: var(--muted);
      }

      /* ── Category section ── */
      .cat-section {
        margin-bottom: 40px;
      }
      .cat-section.hidden {
        display: none;
      }

      .cat-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
        padding: 8px 0 10px 12px;
        border-bottom: 1px solid var(--border);
        border-left: 3px solid var(--amber);
      }
      .cat-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .cat-count {
        font-size: 11px;
        color: var(--dim);
        letter-spacing: 0.06em;
      }

      /* ── Snippet card ── */
      .snippet-card {
        position: relative;
        border: 1px solid var(--border);
        border-left: 3px solid var(--border);
        background: var(--surface);
        margin-bottom: 10px;
        transition:
          border-color 0.15s,
          border-left-color 0.15s;
      }
      .snippet-card:last-child {
        margin-bottom: 0;
      }
      .snippet-card:hover {
        border-color: var(--line);
        border-left-color: var(--amber);
      }
      .snippet-card.hidden {
        display: none;
      }

      .snippet-body {
        padding: 16px 56px 16px 18px;
        font-size: 14px;
        color: var(--text);
        line-height: 1.85;
        white-space: pre-wrap;
        word-break: break-word;
      }

      /* Copy button — top-right corner of card */
      .copy-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        color: var(--dim);
        background: var(--deep);
        border: 1px solid var(--border);
        padding: 4px 9px;
        cursor: pointer;
        white-space: nowrap;
        opacity: 0;
        transition:
          opacity 0.15s,
          color 0.12s,
          border-color 0.12s,
          background 0.12s;
      }
      .snippet-card:hover .copy-btn {
        opacity: 1;
      }
      .copy-btn:hover {
        background: var(--lift);
        color: var(--text);
        border-color: var(--line);
      }
      .copy-btn.copied {
        opacity: 1;
        color: var(--amber);
        border-color: var(--amber);
        background: var(--deep);
      }

      /* Footer — tags only, no copy button */
      .snippet-footer {
        display: flex;
        align-items: center;
        padding: 7px 18px 8px;
        border-top: 1px solid var(--border);
        background: var(--deep);
        gap: 5px;
        flex-wrap: wrap;
      }

      .snippet-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }
      .snippet-tag {
        font-size: 10px;
        letter-spacing: 0.08em;
        color: var(--dim);
        opacity: 0.7;
        background: none;
        border: none;
        padding: 0;
      }
      .snippet-tag + .snippet-tag::before {
        content: "·";
        margin-right: 4px;
        opacity: 0.4;
      }

      /* ── Comment ── */
      .snippet-comment {
        padding: 9px 18px 10px;
        border-top: 1px solid var(--border);
        background: var(--deep);
        font-size: 12px;
        color: var(--dim);
        line-height: 1.65;
        display: flex;
        gap: 8px;
        align-items: baseline;
      }
      .comment-label {
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--dim);
        opacity: 0.45;
        flex-shrink: 0;
      }

      /* ── Password screen ── */
      #pw-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 60vh;
        gap: 16px;
      }
      #pw-screen.hidden {
        display: none;
      }
      #main-content.hidden {
        display: none;
      }

      .pw-box {
        border: 1px solid var(--border);
        background: var(--surface);
        width: 100%;
        max-width: 360px;
      }
      .pw-box-header {
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        font-size: 10px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--dim);
        background: var(--deep);
      }
      .pw-box-body {
        padding: 20px 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      #pw-field {
        width: 100%;
        background: var(--lift);
        border: 1px solid var(--border);
        color: var(--text);
        font-family: var(--mono);
        font-size: 16px;
        padding: 10px 12px;
        outline: none;
        caret-color: var(--amber);
        transition: border-color 0.15s;
        box-sizing: border-box;
      }
      #pw-field:focus {
        border-color: var(--line);
      }
      #pw-field.err {
        border-color: var(--red);
      }
      #pw-submit {
        font-family: var(--mono);
        font-size: 12px;
        letter-spacing: 0.1em;
        padding: 9px 20px;
        background: var(--lift);
        border: 1px solid var(--border);
        color: var(--text);
        cursor: pointer;
        transition:
          background 0.12s,
          border-color 0.12s,
          color 0.12s;
        align-self: flex-start;
      }
      #pw-submit:hover {
        border-color: var(--amber);
        color: var(--amber);
      }
      #pw-error {
        font-size: 12px;
        color: var(--red);
        letter-spacing: 0.06em;
        min-height: 18px;
      }
      #pw-working {
        font-size: 12px;
        color: var(--dim);
        letter-spacing: 0.06em;
        display: none;
      }

      /* ── Empty state ── */
      .empty-state {
        padding: 48px 0;
        text-align: center;
        color: var(--dim);
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="app-shell">
      <nav class="sidebar" id="sidebar"></nav>

      <div class="page-content">
        <div class="topbar">
          <div class="header-chrome"></div>
          <div class="header-main">
            <button
              class="sidebar-toggle"
              id="sidebar-toggle"
              aria-label="Ava menüü"
            >
              ☰
            </button>
            <div class="title-block">
              <h1>Lausepank</h1>
              <div class="subtitle">
                <span class="subtitle-label">
                  Juriidilised tekstikatked kopeerimisvalmis
                </span>
              </div>
            </div>
          </div>
        </div>

        <!-- Password screen -->
        <div id="pw-screen">
          <div class="pw-box">
            <div class="pw-box-header">// Mallid — sisene parooliga</div>
            <div class="pw-box-body">
              <input
                type="password"
                id="pw-field"
                placeholder="parool…"
                autocomplete="current-password"
              />
              <div id="pw-error"></div>
              <div id="pw-working">// Dekrüpteeritakse…</div>
              <button id="pw-submit">Sisene</button>
            </div>
          </div>
        </div>

        <!-- Main content — hidden until decrypted -->
        <main id="main-content" class="hidden">
          <div class="filter-bar" id="filter-bar"></div>
          <div class="results-meta" id="results-meta"></div>
          <div id="snippet-list"></div>
        </main>

        <footer></footer>
      </div>
    </div>

    <script src="nav.js"></script>
    <script type="module">
      // ── Crypto helpers ────────────────────────────────────────────────────────────
      const _enc = new TextEncoder();
      const _dec = new TextDecoder();

      function fromBase64(b64) {
        return Uint8Array.from(atob(b64), (c) => c.charCodeAt(0));
      }

      async function deriveKey(password, salt) {
        const km = await crypto.subtle.importKey(
          "raw",
          _enc.encode(password),
          "PBKDF2",
          false,
          ["deriveKey"],
        );
        return crypto.subtle.deriveKey(
          { name: "PBKDF2", salt, iterations: 300000, hash: "SHA-256" },
          km,
          { name: "AES-GCM", length: 256 },
          false,
          ["decrypt"],
        );
      }

      async function decryptData(password) {
        const resp = await fetch("lausepank-andmed.enc");
        if (!resp.ok) {
          throw new Error(
            "Fail lausepank-andmed.enc ei leitud (HTTP " + resp.status + ")",
          );
        }
        const envelope = await resp.json();
        const salt = fromBase64(envelope.salt);
        const iv = fromBase64(envelope.iv);
        const data = fromBase64(envelope.data);
        const key = await deriveKey(password, salt);
        const plaintext = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv },
          key,
          data,
        );
        return JSON.parse(_dec.decode(plaintext));
      }

      // ── Session cache ────────────────────────────────────────────────────────────
      const SESSION_KEY = "lausepank_snippets";

      function saveToSession(snippets) {
        try {
          sessionStorage.setItem(SESSION_KEY, JSON.stringify(snippets));
        } catch {
          /* ignore */
        }
      }

      function loadFromSession() {
        try {
          const raw = sessionStorage.getItem(SESSION_KEY);
          return raw ? JSON.parse(raw) : null;
        } catch {
          return null;
        }
      }

      // ── Password screen elements ────────────────────────────────────────────────
      const pwScreen = document.getElementById("pw-screen");
      const mainContent = document.getElementById("main-content");
      const pwField = document.getElementById("pw-field");
      const pwSubmit = document.getElementById("pw-submit");
      const pwError = document.getElementById("pw-error");
      const pwWorking = document.getElementById("pw-working");

      // ── State ───────────────────────────────────────────────────────────────────
      let SNIPPETS = [];
      let activeCategory = null; // null = all
      let activeTags = new Set();

      // ── Utilities ───────────────────────────────────────────────────────────────
      const SUP_MAP = {
        "¹": "1",
        "²": "2",
        "³": "3",
        "⁴": "4",
        "⁵": "5",
        "⁶": "6",
        "⁷": "7",
        "⁸": "8",
        "⁹": "9",
        "⁰": "0",
      };
      const SUP_RE = /[¹²³⁴-⁹⁰]/g;

      function escHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function renderText(s) {
        return escHtml(s).replace(SUP_RE, (ch) => `<sup>${SUP_MAP[ch]}<\/sup>`);
      }

      // ── Filter logic ────────────────────────────────────────────────────────────
      function filteredSnippets() {
        return SNIPPETS.filter((s) => {
          if (activeCategory && s.category !== activeCategory) return false;
          if (
            activeTags.size > 0 &&
            ![...activeTags].every((t) => s.tags.includes(t))
          ) {
            return false;
          }
          return true;
        });
      }

      // ── Render filter bar ───────────────────────────────────────────────────────
      function renderFilters() {
        const ALL_CATEGORIES = [...new Set(SNIPPETS.map((s) => s.category))];
        const ALL_TAGS = [...new Set(SNIPPETS.flatMap((s) => s.tags))].sort();

        const bar = document.getElementById("filter-bar");
        bar.innerHTML = "";

        // Categories
        const catGroup = document.createElement("div");
        catGroup.className = "filter-group";
        catGroup.innerHTML = '<div class="filter-group-label">Kategooria</div>';
        const catRow = document.createElement("div");
        catRow.className = "tag-row";

        const allBtn = document.createElement("button");
        allBtn.className =
          "tag-btn" + (activeCategory === null ? " active" : "");
        allBtn.textContent = "Kõik";
        allBtn.addEventListener("click", () => {
          activeCategory = null;
          renderAll();
        });
        catRow.appendChild(allBtn);

        ALL_CATEGORIES.forEach((cat) => {
          const btn = document.createElement("button");
          btn.className = "tag-btn" + (activeCategory === cat ? " active" : "");
          btn.textContent = cat;
          btn.addEventListener("click", () => {
            activeCategory = activeCategory === cat ? null : cat;
            renderAll();
          });
          catRow.appendChild(btn);
        });

        catGroup.appendChild(catRow);
        bar.appendChild(catGroup);

        const sep = document.createElement("div");
        sep.className = "filter-sep";
        bar.appendChild(sep);

        // Tags
        const tagGroup = document.createElement("div");
        tagGroup.className = "filter-group";
        tagGroup.innerHTML = '<div class="filter-group-label">Silt</div>';
        const tagRow = document.createElement("div");
        tagRow.className = "tag-row";

        ALL_TAGS.forEach((tag) => {
          const btn = document.createElement("button");
          btn.className = "tag-btn" + (activeTags.has(tag) ? " active" : "");
          btn.textContent = tag;
          btn.dataset.tag = tag;
          btn.addEventListener("click", () => {
            if (activeTags.has(tag)) {
              activeTags.delete(tag);
            } else {
              activeTags.add(tag);
            }
            renderAll();
          });
          tagRow.appendChild(btn);
        });

        tagGroup.appendChild(tagRow);
        bar.appendChild(tagGroup);
      }

      // ── Render snippets ─────────────────────────────────────────────────────────
      function renderSnippets() {
        const list = document.getElementById("snippet-list");
        const meta = document.getElementById("results-meta");
        const visible = filteredSnippets();

        list.innerHTML = "";

        if (visible.length === 0) {
          list.innerHTML =
            '<div class="empty-state">// ühtegi malli ei leitud</div>';
          meta.innerHTML = "";
          return;
        }

        const byCat = {};
        visible.forEach((s) => {
          if (!byCat[s.category]) byCat[s.category] = [];
          byCat[s.category].push(s);
        });

        const catCount = Object.keys(byCat).length;
        meta.innerHTML = `<span>${visible.length}</span> mall${
          visible.length === 1 ? "" : "i"
        } · <span>${catCount}</span> kategooria${catCount === 1 ? "s" : "s"}`;

        Object.entries(byCat).forEach(([cat, snippets]) => {
          const section = document.createElement("div");
          section.className = "cat-section";

          section.innerHTML = `
            <div class="cat-header">
              <span class="cat-title">${cat}</span>
              <span class="cat-count">${snippets.length} malli</span>
            </div>`;

          snippets.forEach((s) => {
            const card = document.createElement("div");
            card.className = "snippet-card";
            card.dataset.id = s.id;

            const tagsHtml = s.tags
              .map((t) => `<span class="snippet-tag">${t}</span>`)
              .join("");

            const commentHtml = s.comment
              ? `<div class="snippet-comment"><span class="comment-label">// märkus</span>${renderText(
                  s.comment,
                )}</div>`
              : "";

            card.innerHTML = `
              <button class="copy-btn" data-id="${s.id}">Kopeeri</button>
              <div class="snippet-body">${renderText(s.text)}</div>
              ${commentHtml}
              <div class="snippet-footer">
                <div class="snippet-tags">${tagsHtml}</div>
              </div>`;

            card
              .querySelector(".copy-btn")
              .addEventListener("click", function () {
                copySnippet(s.id, this);
              });

            section.appendChild(card);
          });

          list.appendChild(section);
        });
      }

      function renderAll() {
        renderFilters();
        renderSnippets();
      }

      // ── Copy ────────────────────────────────────────────────────────────────────
      function copySnippet(id, btn) {
        const s = SNIPPETS.find((x) => x.id === id);
        if (!s) return;

        const fullHtml = renderText(s.text).replace(/\n/g, "<br>");

        const confirmed = () => {
          btn.classList.add("copied");
          const orig = btn.textContent;
          btn.textContent = "Kopeeritud \u2713";
          setTimeout(() => {
            btn.textContent = orig;
            btn.classList.remove("copied");
          }, 1800);
        };

        if (navigator.clipboard && window.ClipboardItem) {
          navigator.clipboard
            .write([
              new ClipboardItem({
                "text/html": new Blob([fullHtml], { type: "text/html" }),
                "text/plain": new Blob([s.text], { type: "text/plain" }),
              }),
            ])
            .then(confirmed)
            .catch(() => {
              navigator.clipboard.writeText(s.text).then(confirmed);
            });
        } else {
          navigator.clipboard.writeText(s.text).then(confirmed);
        }
      }

      // ── Unlock flow ─────────────────────────────────────────────────────────────
      function showContent(snippets) {
        SNIPPETS = snippets;
        pwScreen.classList.add("hidden");
        mainContent.classList.remove("hidden");
        renderAll();
      }

      async function tryUnlock() {
        const pw = pwField.value;
        if (!pw) {
          pwError.textContent = "// Parool on tühi.";
          return;
        }
        pwError.textContent = "";
        pwField.classList.remove("err");
        pwSubmit.disabled = true;
        pwWorking.style.display = "";

        try {
          const snippets = await decryptData(pw);
          saveToSession(snippets);
          showContent(snippets);
        } catch {
          pwField.classList.add("err");
          pwError.textContent = "// Vale parool.";
          pwField.select();
        } finally {
          pwSubmit.disabled = false;
          pwWorking.style.display = "none";
        }
      }

      pwSubmit.addEventListener("click", tryUnlock);
      pwField.addEventListener("keydown", (e) => {
        if (e.key === "Enter") tryUnlock();
      });

      // ── Auto-unlock from session cache ──────────────────────────────────────────
      const cached = loadFromSession();
      if (cached) {
        showContent(cached);
      } else {
        pwField.focus();
      }

      // ── Bootstrap ───────────────────────────────────────────────────────────────
      document
        .querySelectorAll(".footer-year")
        .forEach((el) => (el.textContent = new Date().getFullYear()));
    </script>
  </body>
</html>
